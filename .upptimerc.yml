owner: getreica
repo: status-page
user-agent: getreica

sites:
  - name: Reica Website
    url: $WEBSITE_URL
  - name: Product Service
    url: $PRODUCT_API_URL
    method: GET
    headers:
      - "X-Health-Token: $HEALTH_CHECK_TOKEN"
  - name: API Service
    url: $API_URL
    method: GET
    headers:
      - "X-Health-Token: $HEALTH_CHECK_TOKEN"
  - name: Relevance Score
    url: $RUNPOD_API_URL
    method: GET
    expectedStatusCodes:
      - 200
      - 401
  - name: Database
    url: $SUPABASE_URL
    expectedStatusCodes:
      - 200
      - 401
      - 404

status-website:
  cname: status.getreica.com
  themeUrl: /reica-theme.css
  customHeadHtml: >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  logoUrl: https://getreica.com/logo.png
  logoHref: https://getreica.com
  hideNavLogo: true
  name: reica
  introTitle: Infrastructure status **built for brands.**
  introMessage: Live availability, response times, and incident history for Reica's core services.
  favicon: https://getreica.com/favicon.ico
  navbar:
    - title: Status
      href: /
    - title: Website
      href: https://getreica.com
      target: _blank
    - title: GitHub
      href: https://github.com/getreica/status-page
      target: _blank
