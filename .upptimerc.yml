owner: getreica
repo: status-page
user-agent: getreica

sites:
  - name: Reica Website
    url: $WEBSITE_URL
  - name: Product Service
    url: $PRODUCT_API_URL
    method: GET
    headers:
      - "X-Health-Token: $HEALTH_CHECK_TOKEN"
  - name: API Service
    url: $API_URL
    method: GET
    headers:
      - "X-Health-Token: $HEALTH_CHECK_TOKEN"
  - name: Relevance Score
    url: $RUNPOD_API_URL
    method: GET
    expectedStatusCodes:
      - 200
      - 401
  - name: Database
    url: $SUPABASE_URL
    expectedStatusCodes:
      - 200
      - 401
      - 404

status-website:
  cname: status.getreica.com
  theme: dark
  logoUrl: https://getreica.com/logo.png
  name: Reica Status
  introTitle: Reica system status
  introMessage: Live status and uptime history for Reica's infrastructure.
  favicon: https://getreica.com/favicon.ico
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/getreica/status-page
